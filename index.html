<!DOCTYPE html>
<html lang="ch-de">
<head>
    <title>Zofingen Countdown</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1 class="title">Countdown bis Ferien</h1>
    <div class="feriendiv">
        <h2>Ferien (4. Juli 2026) </h2>
        <p id="ferien"></p>
    </div>
    <div class="kinderfestdiv">
    <h2>Kinderfestwoche</h2>
    <p id="kinderfest"></p>
        </div>

<footer>
    <p> By And_pan3</p>
    <p class="warning">Nur fürs Jahr 2026</p>
    <p><a href="https://github.com/AndPan3">GitHub</a></p>
    <p><a href="https://www.instagram.com/and_pan3/">Instagram</a></p>
    <p><a href="https://www.tiktok.com/@and_pan3">TikTok</a></p>
</footer>
<script>
    const ferien=document.getElementById("ferien");
    const kinderfest=document.getElementById("kinderfest");

    var kinderfestdate=new Date(2026, 5, 29);
    var feriendate=new Date(2026, 6, 4);

    function countdownupdate(){

        var now=new Date()
        var kinderfestdiff= kinderfestdate-now
        var feriendiff= feriendate-now
        const kinderfestdays = Math.ceil(kinderfestdiff / (1000 * 60 * 60 * 24));
        const feriendays = Math.ceil(feriendiff / (1000 * 60 * 60 * 24));
        ferien.textContent = feriendays + " Tage";
        kinderfest.textContent = kinderfestdays + " Tage"; 
    }
    countdownupdate()
    setInterval(countdownupdate, 60000);
</script>
 <script data-goatcounter="https://andpan3.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
